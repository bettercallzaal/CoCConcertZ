<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1098 1098" width="1098" height="1098">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#FFE54C"/>
      <stop offset="55%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#1a1500"/>
    </radialGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#FFD600"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#050505" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="1098" height="1098" fill="url(#bg)"/>
  <rect width="1098" height="1098" fill="url(#grid)"/>

  <!-- Diagonal scratch marks -->
  <g opacity="0.18" stroke="#050505" stroke-width="3" stroke-linecap="round">
    <line x1="40" y1="100" x2="180" y2="60"/>
    <line x1="60" y1="220" x2="160" y2="200"/>
    <line x1="900" y1="80" x2="1040" y2="120"/>
    <line x1="950" y1="900" x2="1060" y2="980"/>
    <line x1="80" y1="1000" x2="200" y2="1050"/>
  </g>

  <!-- Corner accents -->
  <g stroke="#050505" stroke-width="4" fill="none">
    <path d="M 36 36 L 36 100 M 36 36 L 100 36"/>
    <path d="M 1062 36 L 1062 100 M 1062 36 L 998 36"/>
    <path d="M 36 1062 L 36 998 M 36 1062 L 100 1062"/>
    <path d="M 1062 1062 L 1062 998 M 1062 1062 L 998 1062"/>
  </g>

  <!-- Top eyebrow -->
  <text x="549" y="160" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="22" font-weight="700" fill="#050505" letter-spacing="14">
    LIVE IN THE METAVERSE
  </text>

  <!-- Big title -->
  <text x="549" y="380" text-anchor="middle" font-family="Impact, 'Bebas Neue', Arial Black, sans-serif" font-size="190" font-weight="900" fill="#050505" letter-spacing="6">
    C.O.C.
  </text>
  <text x="549" y="540" text-anchor="middle" font-family="Impact, 'Bebas Neue', Arial Black, sans-serif" font-size="120" font-weight="900" fill="#050505" letter-spacing="8">
    CONCERTZ #1
  </text>

  <!-- Center bar -->
  <rect x="200" y="600" width="698" height="3" fill="#050505" opacity="0.6"/>

  <!-- Artist names -->
  <text x="549" y="700" text-anchor="middle" font-family="Impact, 'Bebas Neue', Arial Black, sans-serif" font-size="76" font-weight="900" fill="#050505" letter-spacing="6">
    ATTABOTTY
  </text>
  <text x="549" y="770" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="20" font-weight="600" fill="#050505" letter-spacing="8" opacity="0.7">
    AND
  </text>
  <text x="549" y="850" text-anchor="middle" font-family="Impact, 'Bebas Neue', Arial Black, sans-serif" font-size="76" font-weight="900" fill="#050505" letter-spacing="6">
    CLEJAN
  </text>

  <!-- Bottom bar -->
  <rect x="200" y="900" width="698" height="3" fill="#050505" opacity="0.6"/>

  <!-- Date + venue -->
  <text x="549" y="970" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="28" font-weight="700" fill="#050505" letter-spacing="8">
    MARCH 29, 2025
  </text>
  <text x="549" y="1010" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="18" font-weight="600" fill="#050505" letter-spacing="10" opacity="0.75">
    THE FIRST EVER COC SHOW
  </text>
  <text x="549" y="1050" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="600" fill="#050505" letter-spacing="6" opacity="0.55">
    THE ZAO + COMMUNITY OF COMMUNITIES
  </text>
</svg>
